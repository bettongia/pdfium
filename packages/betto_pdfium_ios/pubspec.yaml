name: betto_pdfium_ios
description: >
  Flutter iOS companion plugin for betto_pdfium. Carries the PDFium static
  xcframework SPM dependency so that DynamicLibrary.process() can resolve
  FPDF_* symbols at runtime in any Flutter app using betto_pdfium on iOS.
  No method channels or platform interaction.
publish_to: none
version: 0.0.1

environment:
  sdk: ^3.12.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: BettoPdfiumIosPlugin
