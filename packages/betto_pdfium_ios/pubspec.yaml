name: betto_pdfium_ios
description: >
  Flutter iOS companion plugin for betto_pdfium. Carries the PDFium static
  xcframework SPM dependency.

version: 0.1.0-dev.1
homepage: https://bettongia.github.io/pdfium/
repository: https://github.com/bettongia/pdfium
issue_tracker: https://github.com/bettongia/pdfium/issues

topics:
  - pdf
  - pdfium

environment:
  sdk: ^3.12.0
  flutter: ^3.44.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: BettoPdfiumIosPlugin
