name: betto_pdfium
description:
  A pure Dart package wrapping the PDFium library for PDF rendering, text
  extraction, and annotation support.
version: 0.1.0-dev.3
repository: https://github.com/bettongia/pdfium
issue_tracker: https://github.com/bettongia/pdfium/issues
homepage: https://bettongia.github.io/pdfium

topics:
  - pdfium
  - pdf
  - ffi

platforms:
  macos:
  linux:
  android:
  ios:
  web:

environment:
  sdk: ^3.12.0

dependencies:
  args: ^2.7.0
  code_assets: ^1.2.1
  collection: ^1.19.1
  ffi: ^2.2.0
  hooks: ^2.0.2
  meta: ^1.18.0

dev_dependencies:
  build_runner: ^2.15.0
  ffigen: ^20.1.1
  lints: ^6.1.0
  test: ^1.31.1
