name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-26.04

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      # Flutter is required for `flutter analyze` (betto_pdfium_ios) and
      # `flutter pub get` (integration_test_app) called by `make cicd`.
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Install Pandoc
        uses: pandoc/actions/setup@v1

      - name: Install addlicense
        run: |
          go install github.com/google/addlicense@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Cache PDFium binary
        uses: actions/cache@v5
        with:
          path: packages/betto_pdfium/.dart_tool/betto_pdfium
          key: pdfium-${{ runner.os }}-${{ hashFiles('packages/betto_pdfium/BBLANCHON_BUILD') }}

      - run: make cicd

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./site"

  test:
    needs: build
    continue-on-error: true
    strategy:
      matrix:
        runner: [macos-26, ubuntu-26.04-arm, windows-latest]
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Cache PDFium binary
        uses: actions/cache@v5
        with:
          path: packages/betto_pdfium/.dart_tool/betto_pdfium
          key: pdfium-${{ runner.os }}-${{ hashFiles('packages/betto_pdfium/BBLANCHON_BUILD') }}

      - name: dart pub get
        shell: bash
        run: cd packages/betto_pdfium && dart pub get

      - shell: bash
        run: cd packages/betto_pdfium && dart test

  # ---------- Web: WASM tests via headless Chrome ----------
  # Requires pdfium.js + pdfium.wasm downloaded from bblanchon at build time;
  # these are not committed (gitignored). The fetch_wasm_assets target downloads
  # and verifies them; the cache avoids redundant downloads on re-runs.
  test-web:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - uses: browser-actions/setup-chrome@v2

      # Ubuntu 23.10+ disables unprivileged user namespaces via AppArmor, which
      # breaks Chrome's sandbox in CI.  Wrap the binary so dart test picks up
      # --no-sandbox without needing to modify the Makefile.
      - name: Create no-sandbox Chrome wrapper
        run: |
          printf '#!/bin/sh\nexec chrome --no-sandbox "$@"\n' \
            > /usr/local/bin/chrome-no-sandbox
          chmod +x /usr/local/bin/chrome-no-sandbox

      - name: Cache PDFium WASM assets
        uses: actions/cache@v5
        with:
          path: packages/betto_pdfium/integration_test_app/web/assets/pdfium
          key: pdfium-wasm-${{ hashFiles('packages/betto_pdfium/BBLANCHON_BUILD') }}

      - name: dart pub get
        run: cd packages/betto_pdfium && dart pub get

      - run: make web_test
        env:
          CHROME_EXECUTABLE: /usr/local/bin/chrome-no-sandbox

  deployment:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
