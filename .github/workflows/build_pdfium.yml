name: Build PDFium

on:
  push:
    branches: [main]
    paths: [PDFIUM_VERSION]
  workflow_dispatch:

jobs:
  # ── Apple (macOS arm64 + iOS arm64) ─────────────────────────────────────────
  build-apple:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Checkout pdfium-build branch
        uses: actions/checkout@v7
        with:
          ref: pdfium-build
          path: pdfium-build

      - name: Read PDFium SHA
        id: sha
        run: echo "sha=$(cat PDFIUM_VERSION)" >> "$GITHUB_OUTPUT"

      - name: Cache build workspace
        uses: actions/cache@v6
        with:
          path: pdfium-build/build
          key: pdfium-build-apple-v2-${{ steps.sha.outputs.sha }}

      - name: Build macOS arm64
        working-directory: pdfium-build
        env:
          PDFIUM_REVISION: ${{ steps.sha.outputs.sha }}
        run: make build_pdfium_macos

      - name: Smoke test macOS arm64
        working-directory: pdfium-build
        run: |
          cc -o smoke_test scripts/smoke_test.c
          ./smoke_test dist/mac-arm64/libpdfium.dylib

      - name: Build iOS arm64
        working-directory: pdfium-build
        env:
          PDFIUM_REVISION: ${{ steps.sha.outputs.sha }}
        run: make build_pdfium_ios

      # iOS is a static xcframework — cannot smoke test via dlopen without a
      # device or simulator. Skipped; correctness is implied by a clean build.

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm64
          path: pdfium-build/dist/mac-arm64/

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-arm64
          path: pdfium-build/dist/ios-arm64/

  # ── Linux x86_64 ────────────────────────────────────────────────────────────
  build-linux-x64:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7

      - name: Checkout pdfium-build branch
        uses: actions/checkout@v7
        with:
          ref: pdfium-build
          path: pdfium-build

      - name: Read PDFium SHA
        id: sha
        run: echo "sha=$(cat PDFIUM_VERSION)" >> "$GITHUB_OUTPUT"

      - name: Cache build workspace
        uses: actions/cache@v6
        with:
          path: pdfium-build/build
          key: pdfium-build-linux-x64-v2-${{ steps.sha.outputs.sha }}

      - name: Build Linux x86_64
        working-directory: pdfium-build
        env:
          PDFIUM_REVISION: ${{ steps.sha.outputs.sha }}
        run: make build_pdfium_linux_x64

      - name: Smoke test Linux x86_64
        working-directory: pdfium-build
        run: |
          cc -o smoke_test scripts/smoke_test.c -ldl
          ./smoke_test dist/linux-x64/libpdfium.so

      - name: Package public headers
        working-directory: pdfium-build
        run: |
          STAGE="$(pwd)/dist"
          cd build/pdfium_checkout/pdfium
          zip -r "$STAGE/pdfium-headers.zip" public/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-x64
          path: pdfium-build/dist/linux-x64/

      - name: Upload headers artifact
        uses: actions/upload-artifact@v7
        with:
          name: pdfium-headers
          path: pdfium-build/dist/pdfium-headers.zip

  # ── Linux arm64 (native) ─────────────────────────────────────────────────────
  build-linux-arm64:
    runs-on: ubuntu-26.04-arm
    steps:
      - uses: actions/checkout@v7

      - name: Checkout pdfium-build branch
        uses: actions/checkout@v7
        with:
          ref: pdfium-build
          path: pdfium-build

      - name: Read PDFium SHA
        id: sha
        run: echo "sha=$(cat PDFIUM_VERSION)" >> "$GITHUB_OUTPUT"

      - name: Cache build workspace
        uses: actions/cache@v6
        with:
          path: pdfium-build/build
          key: pdfium-build-linux-arm64-v2-${{ steps.sha.outputs.sha }}

      - name: Build Linux arm64
        working-directory: pdfium-build
        env:
          PDFIUM_REVISION: ${{ steps.sha.outputs.sha }}
        run: make build_pdfium_linux_arm64

      - name: Smoke test Linux arm64
        working-directory: pdfium-build
        run: |
          cc -o smoke_test scripts/smoke_test.c -ldl
          ./smoke_test dist/linux-arm64/libpdfium.so

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-arm64
          path: pdfium-build/dist/linux-arm64/

  # ── Android (arm64 + x86_64) ────────────────────────────────────────────────
  # Smoke test skipped: Android .so files require an Android runtime
  # (device or emulator) and cannot be loaded natively on the Linux runner.
  build-android:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7

      - name: Checkout pdfium-build branch
        uses: actions/checkout@v7
        with:
          ref: pdfium-build
          path: pdfium-build

      - name: Read PDFium SHA
        id: sha
        run: echo "sha=$(cat PDFIUM_VERSION)" >> "$GITHUB_OUTPUT"

      - name: Cache build workspace
        uses: actions/cache@v6
        with:
          path: pdfium-build/build
          key: pdfium-build-android-v2-${{ steps.sha.outputs.sha }}

      - name: Build Android arm64
        working-directory: pdfium-build
        env:
          PDFIUM_REVISION: ${{ steps.sha.outputs.sha }}
        run: make build_pdfium_android_arm64

      - name: Build Android x86_64
        working-directory: pdfium-build
        env:
          PDFIUM_REVISION: ${{ steps.sha.outputs.sha }}
        run: make build_pdfium_android_x64

      - name: Upload Android arm64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-arm64
          path: pdfium-build/dist/android-arm64/

      - name: Upload Android x86_64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-x64
          path: pdfium-build/dist/android-x64/

  # ── Web / WASM ───────────────────────────────────────────────────────────────
  # NOTE: Emscripten setup not yet implemented. This job is a placeholder
  # that will fail until build_wasm.sh is extended to install Emscripten
  # and the correct Emscripten version is determined from PDFium's DEPS.
  build-wasm:
    if: false  # Emscripten setup not yet implemented — re-enable when ready
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7

      - name: Checkout pdfium-build branch
        uses: actions/checkout@v7
        with:
          ref: pdfium-build
          path: pdfium-build

      - name: Read PDFium SHA
        id: sha
        run: echo "sha=$(cat PDFIUM_VERSION)" >> "$GITHUB_OUTPUT"

      - name: Cache build workspace
        uses: actions/cache@v6
        with:
          path: pdfium-build/build
          key: pdfium-build-wasm-${{ steps.sha.outputs.sha }}

      - name: Build WASM
        working-directory: pdfium-build
        env:
          PDFIUM_REVISION: ${{ steps.sha.outputs.sha }}
        run: make build_pdfium_wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: wasm
          path: pdfium-build/dist/linux-wasm/

  # ── Publish GitHub Release ───────────────────────────────────────────────────
  publish:
    needs:
      [
        build-apple,
        build-linux-x64,
        build-linux-arm64,
        build-android,
      ]
    runs-on: ubuntu-26.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Read PDFium SHA
        id: sha
        run: echo "sha=$(cat PDFIUM_VERSION)" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Assemble release files
        run: |
          mkdir -p release
          cp artifacts/macos-arm64/libpdfium.dylib       release/libpdfium-macos-arm64.dylib
          cp artifacts/ios-arm64/libpdfium-ios-arm64.xcframework.zip release/
          cp artifacts/linux-x64/libpdfium.so            release/libpdfium-linux-x86_64.so
          cp artifacts/linux-arm64/libpdfium.so          release/libpdfium-linux-arm64.so
          cp artifacts/android-arm64/libpdfium.so        release/libpdfium-android-arm64.so
          cp artifacts/android-x64/libpdfium.so          release/libpdfium-android-x86_64.so
          cp artifacts/pdfium-headers/pdfium-headers.zip release/

      - name: Write VERSION.txt
        run: |
          echo "pdfium_commit=${{ steps.sha.outputs.sha }}" > release/VERSION.txt
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"  >> release/VERSION.txt

      - name: Generate checksums
        working-directory: release
        run: sha256sum * > checksums.sha256

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "pdfium-${{ steps.sha.outputs.sha }}" \
            --title "PDFium ${{ steps.sha.outputs.sha }}" \
            --notes "PDFium commit: \`${{ steps.sha.outputs.sha }}\`

          Built by GitHub Actions from the \`pdfium-build\` branch.
          Run \`make fetch_pdfium\` in \`main\` to install." \
            release/*
